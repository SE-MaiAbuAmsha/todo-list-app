<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>ToDo List App</title>
</head>
<body>
    <div class="container">
        <h1>To Do List</h1>
        <div class="input">
            <input id="enter" type ="text" required placeholder="Enter List Title:">
            <button id="add" type="submit">Add</button>
        </div>
        <div class="section">
            <ol id="tasks">
                <!--js-->
            </ol>
        </div>
        <div class="filters">
            <button class="all" id="All">All</button>
            <button id="Completed">Completed</button>
            <button id="Pending">Un Completed</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
